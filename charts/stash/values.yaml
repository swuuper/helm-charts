# Default values for stash.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  registry: docker.io
  repository: stashapp/stash
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v0.31.1@sha256:df744af5a0c976e2ec671052ecc1f8a9aa757fa12b8f9930b59910b7295f0da6"

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 9999

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  # Workaround for Stash serving plugin JavaScript assets with
  # Content-Type: text/plain. Browsers block ES modules served that way
  # (X-Content-Type-Options: nosniff), which breaks "app"-style plugins such as
  # stashGifs. When enabled, an ingress-nginx configuration-snippet forces the
  # Content-Type for matching plugin asset paths.
  #
  # NOTE: only works with the ingress-nginx controller, and requires the
  # controller to allow snippet annotations (`allow-snippet-annotations: "true"`
  # in its ConfigMap; disabled by default since ingress-nginx v1.9). Do not also
  # set nginx.ingress.kubernetes.io/configuration-snippet in annotations above,
  # or the two will collide.
  pluginMimeFix:
    enabled: false
    contentType: text/javascript
    # Case-insensitive regex matched against $uri (nginx `~*`).
    pathPattern: '^/plugin/.*\.(js|mjs)$'
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    memory: "1Gi"
    cpu: "500m"
  requests:
    memory: "512Mi"
    cpu: "250m"

persistence:
  enabled: true
  volumes:
    data:
      # existingClaim: 'some-pvc-name'
      size: 8Gi
      accessMode: ReadWriteOnce
      # storageClass: ''
    generated:
      # existingClaim: 'some-pvc-name'
      size: 8Gi
      accessMode: ReadWriteOnce
      # storageClass: ''
    metadata:
      # existingClaim: 'some-pvc-name'
      size: 8Gi
      accessMode: ReadWriteOnce
      # storageClass: ''
    cache:
      # existingClaim: 'some-pvc-name'
      size: 8Gi
      accessMode: ReadWriteOnce
      # storageClass: ''
    config:
      # existingClaim: 'some-pvc-name'
      size: 512Mi
      accessMode: ReadWriteOnce
      # storageClass: ''

nodeSelector: {}

tolerations: []

affinity: {}

config:
  special:
    type: charm
    level: very
  directories:
    data: '/data/'
    generated: '/generated/'
    metadata: '/metadata/'
    cache: '/cache/'
    config: '/root/.stash/'

# Plugins
#
# Stash plugins live in a `plugins/` subdirectory of the config directory
# (config.directories.config, i.e. /root/.stash/plugins). Because that directory
# is backed by the persistent `config` volume, any plugin installed from the
# in-app Plugin Manager (Settings -> Plugins -> Available Plugins) already
# persists across pod restarts and upgrades. No configuration is required for
# that workflow.
#
# The block below is only needed if you want to provision plugins declaratively
# at deploy time (GitOps). When enabled, an init container fetches each plugin
# into the plugins directory before Stash starts. Plugins installed this way
# coexist with UI-installed plugins; only directories matching a plugin `id`
# (repositories) or source `name` (git) below are managed (recreated) by the
# init container.
#
# Two source types are supported:
#   * repositories - Stash's native index.yml plugin repository format
#                    (Settings -> Plugins -> Available Plugins sources). Preferred.
#   * sources      - legacy: clone a raw git repository. Still supported.
#
# NOTE: requires persistence.enabled=true so the config volume exists and is
# shared between the init container and the main container.
plugins:
  enabled: false
  # Image used by the init container to fetch plugin sources. Needs sh + git +
  # wget/https; yq and unzip are installed on the fly when `repositories` is set.
  image:
    repository: alpine/git
    tag: latest
    pullPolicy: IfNotPresent

  # Stash plugin repositories (index.yml format). Each repository exposes the
  # newest version of every plugin it hosts; by default the newest is installed.
  # Downloaded zips are verified against the sha256 in the index.
  repositories: []
    # - url: https://surging9143.codeberg.page/   # index.yml is appended automatically
    #   #                                          # (a direct .../index.yml URL also works)
    #   plugins:
    #     - id: stashgifs           # plugin `id` as listed in the repository index
    #     - id: stashStarRater
    #       version: 0.1.12         # optional pin: deploy fails unless the index
    #       #                       # currently offers exactly this version.
    #       #                       # Omit to always install the newest.
    #     - id: sceneTagCleaner
    #       delete: true            # optional (default false): remove this plugin's
    #       #                       # directory instead of installing it. Only the
    #       #                       # named plugin dir is touched; UI-installed
    #       #                       # plugins are never affected. Keep the entry to
    #       #                       # ensure it stays removed across deploys.

  # Legacy git-based sources: clone a raw git repository into the plugins dir.
  sources: []
    # - name: CommunityScripts
    #   repo: https://github.com/stashapp/CommunityScripts.git
    #   # ref: main               # optional git branch OR tag to clone
    #   #                         # (e.g. main, develop, or a tag like v0.28.0);
    #   #                         # `branch` is still accepted as an alias.
    #   # path: plugins           # optional subdir within the repo to copy;
    #   #                         # omit to copy the whole repository
    #   # delete: true            # optional (default false): remove this source's
    #   #                         # directory instead of cloning it.

strategy:
  type: Recreate

